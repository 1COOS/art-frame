name: art_frame
description: "Art Frame Flutter foundation."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^16.2.1
  flutter_riverpod: ^3.0.3
  riverpod_annotation: ^3.0.3
  intl: ^0.20.2
  shared_preferences: ^2.5.3
  file_selector: ^1.1.0
  photo_manager: ^3.8.0
  photo_manager_image_provider: ^2.2.0
  wechat_assets_picker: ^9.5.1
  http: ^1.5.0
  xml: ^6.6.1
  package_info_plus: ^8.3.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^3.0.3
  build_runner: ^2.7.1
  custom_lint: ^0.8.1
  riverpod_lint: ^3.0.3

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/demo/
